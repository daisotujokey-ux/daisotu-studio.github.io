<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAISOTU STUDIO | 大卒スタジオ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-ja {
            font-size: 1.2rem;
            color: #666;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
        }

        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 4rem;
            letter-spacing: 0.1em;
        }

        .section-title {
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .apps {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .app {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            transition: all 0.3s ease;
        }

        .app:hover {
            border-color: #444;
            transform: translateY(-2px);
        }

        .app-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .app-name-en {
            font-size: 0.85rem;
            color: #666;
        }

        .app-status {
            display: inline-block;
            font-size: 0.75rem;
            color: #888;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            margin-top: 0.8rem;
        }

        .app-status.released {
            color: #4ade80;
            border-color: #166534;
            background: #052e16;
        }

        .contact {
            margin-top: 2rem;
        }

        .contact a {
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: #fff;
        }

        .footer {
            margin-top: 4rem;
            color: #333;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 2rem;
            }
            
            .app {
                padding: 1.2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">DAISOTU STUDIO</h1>
        <p class="logo-ja">大卒スタジオ</p>
        <p class="tagline">App Development Studio</p>

        <p class="section-title">Apps</p>
        
        <div class="apps">
            <div class="app">
                <p class="app-name">ヒーロー日記</p>
                <p class="app-name-en">Hero Diary</p>
                <span class="app-status">In Development</span>
            </div>
            
            <div class="app">
                <p class="app-name">ポケットシージ</p>
                <p class="app-name-en">Pocket Siege</p>
                <span class="app-status">In Development</span>
            </div>
            
            <div class="app">
                <p class="app-name">超絶競馬</p>
                <p class="app-name-en">Extreme Horse Racing</p>
                <span class="app-status">In Development</span>
            </div>
        </div>

        <div class="contact">
            <p class="section-title">Contact</p>
            <a href="mailto:contact@daisotu-studio.com">contact@daisotu-studio.com</a>
        </div>

        <p class="footer">&copy; 2025 DAISOTU STUDIO</p>
    </div>
</body>
</html>
